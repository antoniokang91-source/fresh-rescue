<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Life ring base (orange) -->
  <circle cx="50" cy="50" r="49" fill="#FF5733"/>

  <!-- White cross bars clipped to circle -->
  <clipPath id="ringMask">
    <circle cx="50" cy="50" r="49"/>
  </clipPath>
  <rect x="43.5" y="1" width="13" height="98" fill="white" clip-path="url(#ringMask)"/>
  <rect x="1" y="43.5" width="98" height="13" fill="white" clip-path="url(#ringMask)"/>

  <!-- Center white circle (ring hole) -->
  <circle cx="50" cy="50" r="23" fill="white"/>

  <!-- Produce peeking up -->
  <ellipse cx="44" cy="47" rx="5" ry="6.5" fill="#56C256"/>
  <ellipse cx="50" cy="44" rx="5.5" ry="7.5" fill="#3DAF3D"/>
  <ellipse cx="56" cy="46.5" rx="4.5" ry="6" fill="#56C256"/>
  <line x1="44" y1="41" x2="44" y2="38" stroke="#2E7D32" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="50" y1="36.5" x2="50" y2="33.5" stroke="#2E7D32" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Red tomato -->
  <circle cx="46" cy="43.5" r="3.5" fill="#F44336"/>
  <!-- Orange carrot/citrus -->
  <circle cx="54" cy="44.5" r="3" fill="#FF9500"/>

  <!-- Bag handles -->
  <path d="M43.5 55.5 Q43 47.5 46.5 47.5 Q50 47.5 50 52" stroke="#7B5632" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <path d="M56.5 55.5 Q57 47.5 53.5 47.5 Q50 47.5 50 52" stroke="#7B5632" stroke-width="2.4" fill="none" stroke-linecap="round"/>

  <!-- Bag body -->
  <path d="M41.5 55.5 L43 72 Q43 74.5 45.5 74.5 L54.5 74.5 Q57 74.5 57 72 L58.5 55.5 Z" fill="#D09B28"/>

  <!-- Bag top cuff -->
  <rect x="41.5" y="53.5" width="17" height="5" rx="2" fill="#A8791A"/>

  <!-- Center fold line -->
  <line x1="50" y1="58.5" x2="50" y2="72.5" stroke="#9A6E16" stroke-width="0.8" opacity="0.55"/>
</svg>
