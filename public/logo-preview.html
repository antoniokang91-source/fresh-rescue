<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신선구조대 로고 디자인 후보</title>
  <style>
    body { font-family: 'Apple SD Gothic Neo', sans-serif; background: #f5f5f5; margin: 0; padding: 40px; }
    h1 { text-align: center; color: #333; font-size: 22px; margin-bottom: 40px; }
    .grid { display: flex; gap: 40px; justify-content: center; flex-wrap: wrap; }
    .card {
      background: white; border-radius: 24px; padding: 32px 28px 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10); text-align: center; width: 240px;
    }
    .card h2 { font-size: 15px; color: #555; margin: 16px 0 6px; }
    .card p { font-size: 12px; color: #999; line-height: 1.6; }
    .badge { display: inline-block; margin-top: 12px; background: #FF6B35; color: white;
      font-size: 11px; font-weight: bold; padding: 4px 12px; border-radius: 99px; }
  </style>
</head>
<body>
  <h1>🚑 신선구조대 마스코트 로고 후보 3종</h1>
  <div class="grid">

    <!-- 디자인 A: 헬멧 구조대원 -->
    <div class="card">
      <svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
        <!-- 배경 원 -->
        <circle cx="80" cy="80" r="76" fill="#FFF3EE" stroke="#FF6B35" stroke-width="4"/>

        <!-- 헬멧 -->
        <ellipse cx="80" cy="62" rx="38" ry="22" fill="#FF6B35"/>
        <rect x="42" y="68" width="76" height="10" rx="5" fill="#E85520"/>
        <!-- 헬멧 십자 -->
        <rect x="76" y="54" width="8" height="18" rx="3" fill="white"/>
        <rect x="70" y="60" width="20" height="8" rx="3" fill="white"/>

        <!-- 얼굴 -->
        <ellipse cx="80" cy="95" rx="32" ry="28" fill="#FFD9B3"/>
        <!-- 볼터치 -->
        <ellipse cx="60" cy="100" rx="9" ry="6" fill="#FFAA80" opacity="0.5"/>
        <ellipse cx="100" cy="100" rx="9" ry="6" fill="#FFAA80" opacity="0.5"/>

        <!-- 눈 -->
        <ellipse cx="69" cy="91" rx="7" ry="8" fill="white"/>
        <ellipse cx="91" cy="91" rx="7" ry="8" fill="white"/>
        <circle cx="71" cy="92" r="4.5" fill="#333"/>
        <circle cx="93" cy="92" r="4.5" fill="#333"/>
        <circle cx="72.5" cy="90.5" r="1.5" fill="white"/>
        <circle cx="94.5" cy="90.5" r="1.5" fill="white"/>

        <!-- 코 -->
        <ellipse cx="80" cy="99" rx="3" ry="2" fill="#E8A080"/>

        <!-- 입 (웃는) -->
        <path d="M70 106 Q80 114 90 106" stroke="#C06040" stroke-width="2.5" fill="none" stroke-linecap="round"/>

        <!-- 귀 -->
        <ellipse cx="48" cy="95" rx="7" ry="9" fill="#FFD9B3"/>
        <ellipse cx="112" cy="95" rx="7" ry="9" fill="#FFD9B3"/>

        <!-- 사이렌 불빛 -->
        <circle cx="80" cy="44" r="5" fill="#FF2222" opacity="0.9"/>
        <circle cx="80" cy="44" r="8" fill="#FF2222" opacity="0.2"/>
      </svg>
      <h2>A. 헬멧 구조대원</h2>
      <p>오렌지 헬멧을 쓴<br>귀여운 구조대원 얼굴.<br>십자마크 + 사이렌 포인트</p>
      <span class="badge">추천</span>
    </div>

    <!-- 디자인 B: 과일 들고 있는 캐릭터 -->
    <div class="card">
      <svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
        <!-- 배경 원 -->
        <circle cx="80" cy="80" r="76" fill="#FFFBE6" stroke="#F5A623" stroke-width="4"/>

        <!-- 몸통 (조끼) -->
        <ellipse cx="80" cy="118" rx="28" ry="20" fill="#FF6B35"/>
        <rect x="52" y="104" width="56" height="20" rx="8" fill="#FF6B35"/>
        <!-- 조끼 줄무늬 -->
        <rect x="76" y="104" width="8" height="20" fill="#E85520" opacity="0.5"/>

        <!-- 팔 왼쪽 (과일 들고 있음) -->
        <ellipse cx="44" cy="108" rx="10" ry="8" fill="#FFD9B3" transform="rotate(-30 44 108)"/>
        <!-- 사과 -->
        <circle cx="32" cy="98" r="12" fill="#FF4444"/>
        <path d="M32 87 Q35 82 38 84" stroke="#228833" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <ellipse cx="28" cy="95" rx="4" ry="5" fill="#FF6666" opacity="0.5"/>

        <!-- 팔 오른쪽 -->
        <ellipse cx="116" cy="108" rx="10" ry="8" fill="#FFD9B3" transform="rotate(30 116 108)"/>

        <!-- 얼굴 -->
        <circle cx="80" cy="80" r="30" fill="#FFD9B3"/>
        <!-- 볼터치 -->
        <ellipse cx="62" cy="85" rx="8" ry="5" fill="#FFAA80" opacity="0.5"/>
        <ellipse cx="98" cy="85" rx="8" ry="5" fill="#FFAA80" opacity="0.5"/>

        <!-- 모자 띠 -->
        <path d="M52 62 Q80 52 108 62" stroke="#FF6B35" stroke-width="6" fill="none" stroke-linecap="round"/>

        <!-- 눈 (하트눈) -->
        <path d="M64 74 C64 70 70 70 70 74 C70 70 76 70 76 74 C76 79 70 83 70 83 C70 83 64 79 64 74Z" fill="#FF4444"/>
        <path d="M84 74 C84 70 90 70 90 74 C90 70 96 70 96 74 C96 79 90 83 90 83 C90 83 84 79 84 74Z" fill="#FF4444"/>

        <!-- 코 -->
        <ellipse cx="80" cy="83" rx="3" ry="2" fill="#E8A080"/>

        <!-- 입 -->
        <path d="M70 90 Q80 98 90 90" stroke="#C06040" stroke-width="2.5" fill="none" stroke-linecap="round"/>

        <!-- 귀 -->
        <circle cx="50" cy="80" r="7" fill="#FFD9B3"/>
        <circle cx="110" cy="80" r="7" fill="#FFD9B3"/>
      </svg>
      <h2>B. 과일 구조대원</h2>
      <p>하트눈으로 과일을 사랑하는<br>구조대원 캐릭터.<br>사과를 직접 들고 있는 모습</p>
      <span class="badge" style="background:#F5A623">귀여움</span>
    </div>

    <!-- 디자인 C: 사이렌 머리띠 캐릭터 -->
    <div class="card">
      <svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
        <!-- 배경 원 (진한 테마) -->
        <circle cx="80" cy="80" r="76" fill="#1A1A2E" stroke="#FF6B35" stroke-width="4"/>

        <!-- 후광 (사이렌 느낌) -->
        <circle cx="80" cy="80" r="55" fill="none" stroke="#FF6B35" stroke-width="1" stroke-dasharray="6 4" opacity="0.4"/>

        <!-- 사이렌 등 -->
        <rect x="68" y="38" width="24" height="14" rx="4" fill="#FF2222"/>
        <ellipse cx="80" cy="38" rx="12" ry="6" fill="#FF4444"/>
        <!-- 사이렌 빛줄기 -->
        <line x1="80" y1="28" x2="80" y2="22" stroke="#FF4444" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
        <line x1="92" y1="32" x2="97" y2="27" stroke="#FF4444" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
        <line x1="68" y1="32" x2="63" y2="27" stroke="#FF4444" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

        <!-- 얼굴 -->
        <circle cx="80" cy="88" r="34" fill="#FFD9B3"/>

        <!-- 귀 -->
        <ellipse cx="46" cy="88" rx="8" ry="10" fill="#FFD9B3"/>
        <ellipse cx="114" cy="88" rx="8" ry="10" fill="#FFD9B3"/>

        <!-- 머리 (단발) -->
        <path d="M46 75 Q50 52 80 50 Q110 52 114 75" fill="#4A3728"/>

        <!-- 볼터치 -->
        <ellipse cx="60" cy="96" rx="9" ry="6" fill="#FF9999" opacity="0.6"/>
        <ellipse cx="100" cy="96" rx="9" ry="6" fill="#FF9999" opacity="0.6"/>

        <!-- 눈 (윙크 스타일) -->
        <!-- 왼쪽 일반 눈 -->
        <ellipse cx="68" cy="84" rx="7" ry="8" fill="white"/>
        <circle cx="70" cy="85" r="5" fill="#333"/>
        <circle cx="71.5" cy="83.5" r="1.8" fill="white"/>
        <!-- 오른쪽 윙크 -->
        <path d="M85 84 Q92 79 99 84" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>

        <!-- 코 -->
        <ellipse cx="80" cy="93" rx="3" ry="2" fill="#E8A080"/>

        <!-- 입 (씩 웃음) -->
        <path d="M71 101 Q80 110 90 101" stroke="#C06040" stroke-width="2.5" fill="none" stroke-linecap="round"/>

        <!-- 배지 (오렌지 띠) -->
        <rect x="56" y="116" width="48" height="14" rx="7" fill="#FF6B35"/>
        <text x="80" y="127" text-anchor="middle" font-size="9" font-weight="bold" fill="white">신선구조대</text>
      </svg>
      <h2>C. 사이렌 마스코트</h2>
      <p>다크 배경에 사이렌 빛과<br>윙크하는 귀여운 캐릭터.<br>배지에 신선구조대 텍스트</p>
      <span class="badge" style="background:#1A1A2E">쿨한 느낌</span>
    </div>

  </div>

  <p style="text-align:center; color:#aaa; margin-top:40px; font-size:13px;">
    마음에 드는 디자인을 선택하시면 로고 파일로 제작해드립니다.
  </p>
</body>
</html>
